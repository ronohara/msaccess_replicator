# replicatorconfig.yaml
# Configuration for ODBC to PostgreSQL Database Replication System

# Source DAO connection
DAO:
  driver: "Microsoft Access Driver (*.mdb, *.accdb)"
  database: "Test.accdb"

# Target PostgreSQL SQL connection
postgresql:
  host: localhost
  port: 5432
  database: researchdata
  user: replicator
  password: syhunkea

# Target MS SQL connection
sqlserver:
  host: "localhost"
  port: 1433
  database: "test"
  user: "replicator"
  password: "xxxxxxxx"
#  password: "wrongpwd"

# Global settings
global:
  debug: false
  managerid: "Replicator"
  verbose: true

# Tables to replicate (commented out - will auto-discover from database)
#tables:
#   - "DimKanal"
#   - "FactSatis"

excluded:
  - "Events"

